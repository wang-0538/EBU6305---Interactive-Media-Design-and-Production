<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Community Posts — Color Learning</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/pages/community.css" />
  </head>
  <body data-community-view="all">
    <header class="site-header" role="banner">
      <div id="site-navbar" aria-live="polite"></div>
    </header>

    <main id="main-content" class="community-page community-page--all">
      <section class="community-hero" aria-labelledby="community-title">
        <h1 class="page-title community-hero__title" id="community-title">All Community Posts</h1>
        <p class="lead community-hero__lead">Browse the full feed and inspect each post in detail.</p>
        <div class="community-hero__actions">
          <a class="community-hero__cta community-hero__cta--ghost" href="community.html">Back to Community Home</a>
        </div>
      </section>

      <section class="community-feed-grid" aria-label="All posts and details">
        <section class="community-feed-list">
          <div class="feed-filter" aria-label="Feed filters">
            <span class="feed-filter__label">Filter by:</span>
            <button type="button" class="feed-filter__option is-active" data-filter="latest">Latest</button>
            <button type="button" class="feed-filter__option" data-filter="helpful">Most Helpful</button>
            <button type="button" class="feed-filter__option" data-filter="my-tags">My Tags</button>
            <button type="button" class="feed-filter__option" data-filter="#Accessibility">#Accessibility</button>
          </div>
          <section class="post-list" aria-live="polite" data-post-list></section>
        </section>

        <aside class="community-post-detail" data-post-detail>
          <h2>Select a post</h2>
          <p>Choose a post on the left to preview full details here.</p>
        </aside>
      </section>
    </main>

    <div class="community-toast" data-community-toast hidden>
      <p class="community-toast__message" data-community-toast-message></p>
      <button type="button" class="community-toast__close" data-community-toast-close aria-label="Close message">×</button>
    </div>

    <div class="community-lightbox" data-image-lightbox hidden>
      <div class="community-lightbox__inner">
        <button type="button" class="community-modal__close" data-close-image-lightbox aria-label="Close image preview">×</button>
        <img src="" alt="Expanded post preview" data-lightbox-image />
      </div>
    </div>

    <footer class="site-footer" role="contentinfo">
      <div id="site-footer"></div>
    </footer>

    <script src="js/theme.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/navbar.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/pages/community.js" defer></script>
  </body>
</html>
